<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ponto Burger</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>

<body>
  <header>
    <link rel="shortcut icon" href="Imagens/iconburger.png" type="image/x-icon">
    <img src="Imagens/iconburger.png" alt="Logo Ponto Burger" class="logo">

    <h1>Bem vindo ao Ponto Burger</h1>
    <p>Delivery da Cidade</p>
<nav>
    <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="bebidas.html">Bebidas</a></li>
    </ul>
</nav>

  </header>

  <section class="categorias">
    <button>Inicio</button>
    <button>Bebidas</button>
    <button>Combos</button>
  </section>

  <input type="text" id="busca" placeholder="Pesquisar produto...">

  <section class="cardapio" id="cardapio">
   
    <div class="card">
      <img src="Imagens/refrigerante-2l.jpg" alt="X-Burguer">
      <h3>Refrigerante 2L</h3>
      <p>Inicio</p>
      <p class="preco">R$ 12,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div>
    
    <div class="card">
      <img src="Imagens/coca_cola2l.webp" alt="X-Burguer">
      <h3>Coca-cola 2L</h3>
      <p>Inicio</p>
      <p class="preco">R$ 15,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div>

    <div class="card">
      <img src="Imagens/pepsi_cola_pet_2l.jpg" alt="X-Burguer">
      <h3>Pepsi-cola 2L</h3>
      <p>Inicio</p>
      <p class="preco">R$ 15,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div>

    <div class="card">
      <img src="Imagens/coca-cola-guarana-1-litro.jpg" alt="X-Burguer">
      <h3>Refrigerante 1L</h3>
      <p>Inicio</p>
      <p class="preco">R$ 10,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div> 


    <div class="card">
      <img src="Imagens/suco-laranja-natural.jpg" alt="X-Burguer">
      <h3>Suco-Laranja</h3>
      <p>Inicio</p>
      <p class="preco">R$ 10,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div>

    <div class="card">
      <img src="Imagens/suco-goiaba-natural.png" alt="X-Burguer">
      <h3>Suco-Goiaba</h3>
      <p>Inicio</p>
      <p class="preco">R$ 10,00</p>
      <button onclick="adicionarPedido('X-Burguer')">Adicionar</button>
    </div>

   <!-- Repita os cards aqui -->
  </section>

  <footer>
    <a href="#" id="linkZap">Finalizar pedido via WhatsApp</a>
  </footer>

</body>
</html>
